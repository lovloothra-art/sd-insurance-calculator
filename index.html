<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secured Direct Insurance Calculator - Acko</title>
<style>
    /* Base Styles & Mobile First */
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background-color: #f4f7f6; 
        margin: 0; 
        padding: 10px; 
        color: #333; 
    }
    h2 { 
        text-align: center; 
        color: #2c3e50; 
        font-size: 1.5rem;
        margin-top: 10px;
    }
    .container { 
        max-width: 1100px; 
        margin: 0 auto; 
        background: #fff; 
        padding: 15px 20px; 
        border-radius: 8px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    }
    
    /* Grid Layout */
    .grid { 
        display: grid; 
        grid-template-columns: 1fr; 
        gap: 12px; 
        margin-bottom: 10px; 
    }
    .section-title { 
        grid-column: 1 / -1; 
        margin-top: 15px; 
        margin-bottom: 5px; 
        color: #2c3e50; 
        border-bottom: 2px solid #3498db; 
        padding-bottom: 5px; 
        font-size: 1.1rem;
        font-weight: 600;
    }
    
    /* Inputs */
    .input-group { display: flex; flex-direction: column; }
    .input-group label { margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
    .input-group input, .input-group select { 
        padding: 10px; 
        border: 1px solid #ccc; 
        border-radius: 4px; 
        font-size: 14px; 
        transition: border-color 0.2s; 
        width: 100%;
        box-sizing: border-box;
    }
    .input-group input:focus { border-color: #3498db; outline: none; }
    
    /* Checkboxes */
    .checkbox-group { 
        display: flex; 
        align-items: center; 
        gap: 10px; 
        margin-top: 5px; 
        padding: 5px 0;
    }
    .checkbox-group input[type="checkbox"] {
        width: 18px;
        height: 18px;
    }
    .checkbox-group label { font-weight: normal; margin: 0; cursor: pointer; font-size: 14px;}
    .checkbox-group input[disabled] + label, .checkbox-group input[disabled] { cursor: not-allowed; opacity: 0.7; }
    
    /* Info text */
    .info-labels {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        background: #f8f9fa;
        padding: 10px;
        border-radius: 4px;
        border: 1px solid #e9ecef;
    }
    .flag { color: #e74c3c; font-weight: bold; }

    /* Summary Card */
    .summary-card {
        background: linear-gradient(135deg, #2c3e50, #3498db);
        color: white;
        border-radius: 8px;
        padding: 15px 20px;
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        flex-wrap: wrap;
        gap: 15px;
    }
    .summary-item {
        display: flex;
        flex-direction: column;
    }
    .summary-item .label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #ecf0f1;
        margin-bottom: 4px;
    }
    .summary-item .value {
        font-size: 24px;
        font-weight: bold;
    }

    /* Print Button */
    .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        flex-wrap: wrap;
        gap: 10px;
    }
    .print-btn {
        background-color: #27ae60;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: background 0.3s;
    }
    .print-btn:hover {
        background-color: #2ecc71;
    }

    /* Responsive Table Wrapper */
    .table-wrapper {
        width: 100%;
        overflow-x: auto; 
        -webkit-overflow-scrolling: touch; 
        margin-top: 15px;
        border-radius: 4px;
        box-shadow: 0 0 0 1px #ddd; 
    }
    table { 
        width: 100%; 
        border-collapse: collapse; 
        font-size: 13px; 
        min-width: 800px; 
    }
    th, td { padding: 8px; text-align: left; border: 1px solid #ddd; }
    th { background-color: #f8f9fa; font-weight: bold; white-space: nowrap; }
    .totals { font-weight: bold; background-color: #eaf2f8; }

    /* Tablet and Desktop adjustments */
    @media (min-width: 600px) {
        .grid { grid-template-columns: repeat(2, 1fr); }
        .info-labels { align-items: center; flex-direction: row; justify-content: space-around; }
    }
    
    @media (min-width: 900px) {
        body { padding: 20px; }
        .grid { grid-template-columns: repeat(4, 1fr); gap: 15px;}
        .info-labels { flex-direction: column; justify-content: center; align-items: center; }
        table { min-width: auto; font-size: 13px; } 
    }

    /* Print specific CSS */
    @media print {
        @page { size: A4 portrait; margin: 10mm; }
        body { padding: 0; background: #fff; font-size: 11px; }
        .container { box-shadow: none; padding: 0; max-width: 100%; }
        h2 { font-size: 16px; margin: 0 0 10px 0; text-align: left; }
        .header-actions { justify-content: flex-start; margin-bottom: 10px; }
        .print-btn { display: none; } /* Hide print button */
        
        .grid { gap: 5px; margin-bottom: 5px; }
        .input-group input { border: none; border-bottom: 1px solid #000; padding: 2px 0; font-size: 11px; border-radius: 0; }
        .input-group label { margin-bottom: 0px; font-size: 10px; color: #000; }
        .section-title { font-size: 12px; margin-top: 10px; padding-bottom: 2px; border-bottom: 1px solid #000; color: #000;}
        .checkbox-group { display: none; } /* Hide checkboxes on print, table shows what was selected */
        
        .summary-card { 
            background: none !important; 
            color: #000 !important; 
            border: 1px solid #000; 
            box-shadow: none; 
            padding: 10px; 
            margin-top: 10px;
        }
        .summary-item .label { color: #000; font-size: 10px; }
        .summary-item .value { font-size: 16px; }
        
        .table-wrapper { overflow: visible; box-shadow: none; margin-top: 10px; }
        table { min-width: 100%; font-size: 10px; }
        th { background-color: #eee !important; -webkit-print-color-adjust: exact; color: #000; }
        th, td { padding: 4px; border: 1px solid #000; }
    }
</style>
</head>

    function calcAge(dob, disDate) {
        const birthDate = new Date(dob);
        const refDate = new Date(disDate);
        let age = refDate.getFullYear() - birthDate.getFullYear();
        const m = refDate.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && refDate.getDate() < birthDate.getDate())) {
            age--;
        }
        return age;
    }

    function checkMedicalFlag(age, saLI) {
        let limit = 0;
        if (age <= 40) limit = 5000000;
        else if (age <= 45) limit = 5000000;
        else if (age <= 50) limit = 4000000;
        else if (age <= 55) limit = 2000000;
        else if (age <= 60) limit = 1500000;
        else limit = 0; // Age 60+ allows 0 non-medical limit
        
        return saLI <= limit ? "Non Medical" : "Medicals Required";
    }

    function formatAmt(val) {
        return Number(val).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    function formatPercent(val) {
        return (val * 100).toFixed(4) + '%';
    }

    function calculatePremium() {
        const dob = document.getElementById('dob').value;
        const disbDate = document.getElementById('disbDate').value;
        if(!dob || !disbDate) return;

        const age = calcAge(dob, disbDate);
        document.getElementById('ageDisplay').innerText = age >= 0 ? age : '-';

        const saLI = Number(document.getElementById('saLI').value) || 0;
        const medFlag = age >= 0 ? checkMedicalFlag(age, saLI) : '-';
        document.getElementById('medicalFlag').innerText = medFlag;

        const saGI = Number(document.getElementById('saGI').value) || 0;
        const saProp = Number(document.getElementById('saProp').value) || 0;
        const loanAmt = Number(document.getElementById('loanAmt').value) || 1;
        
        const lifeTenure = parseInt(document.getElementById('lifeTenure').value) || 1;
        const giTenure = parseInt(document.getElementById('giTenure').value) || 1;
        const propTenure = parseInt(document.getElementById('propTenure').value) || 1;
        const deathCovPercent = (Number(document.getElementById('deathCoverage').value) || 0) / 100;

        let totalPrem = 0;
        let totalGST = 0;
        const rows = [];

        // 1. Life Insurance: Allowed up to Age 65
        if (age >= 18 && age <= 65) {
            if (lifeRates[age] && lifeRates[age][lifeTenure - 1]) {
                const rate = lifeRates[age][lifeTenure - 1];
                const basePrem = (saLI * deathCovPercent * rate) / 1000;
                const gst = basePrem * 0.18;
                const total = basePrem + gst;
                const vp = total / loanAmt;
                totalPrem += total;
                totalGST += gst;
                rows.push(`<tr><td>ACKO Life Insurance</td><td>Death Cover</td><td>${lifeTenure} Years</td><td>${(deathCovPercent*100).toFixed(0)}%</td><td>${saLI}</td><td>${formatAmt(basePrem)}</td><td>${formatAmt(gst)}</td><td>${formatAmt(total)}</td><td>${formatPercent(vp)}</td></tr>`);
            } else {
                rows.push(`<tr><td colspan="9" style="color:red; text-align:center;">No Life rate available for Age ${age}, Tenure ${lifeTenure}</td></tr>`);
            }
        } else if (age > 65) {
            rows.push(`<tr><td colspan="9" style="color:red; text-align:center;">Death Cover is not available for Age > 65</td></tr>`);
        }

        const idxGI = giTenure - 1;
        const idxProp = propTenure - 1;

        // 2. GI Covers (CI, PPD, EMI) - Strict block for > 60
        if (age <= 60) {
            if (document.getElementById('reqCI').checked && idxGI >= 0 && idxGI < 5) {
                const rate = age <= 45 ? giRates.ci_upto45[idxGI] : giRates.ci_over45[idxGI];
                const base = saGI * rate;
                const gst = base * 0.18;
                const total = base + gst;
                totalPrem += total; totalGST += gst;
                rows.push(`<tr><td>ACKO General Insurance</td><td>Critical Illness</td><td>${giTenure} Years</td><td>Y</td><td>${saGI}</td><td>${formatAmt(base)}</td><td>${formatAmt(gst)}</td><td>${formatAmt(total)}</td><td>${formatPercent(total/loanAmt)}</td></tr>`);
            }

            if (document.getElementById('reqPPD').checked && idxGI >= 0 && idxGI < 5) {
                const base = saGI * giRates.ppd[idxGI];
                const gst = base * 0.18;
                const total = base + gst;
                totalPrem += total; totalGST += gst;
                rows.push(`<tr><td>ACKO General Insurance</td><td>Permanent Disability</td><td>${giTenure} Years</td><td>Y</td><td>${saGI}</td><td>${formatAmt(base)}</td><td>${formatAmt(gst)}</td><td>${formatAmt(total)}</td><td>${formatPercent(total/loanAmt)}</td></tr>`);
            }

            if (document.getElementById('reqEMI').checked && idxGI >= 0 && idxGI < 5) {
                const base = saGI * giRates.emi[idxGI];
                const gst = base * 0.18;
                const total = base + gst;
                totalPrem += total; totalGST += gst;
                rows.push(`<tr><td>ACKO General Insurance</td><td>EMI Benefit</td><td>${giTenure} Years</td><td>Y</td><td>${saGI}</td><td>${formatAmt(base)}</td><td>${formatAmt(gst)}</td><td>${formatAmt(total)}</td><td>${formatPercent(total/loanAmt)}</td></tr>`);
            }
        } else {
            // Optional warning row if checkboxes were active but age > 60
            if (document.getElementById('reqCI').checked || document.getElementById('reqPPD').checked || document.getElementById('reqEMI').checked) {
                rows.push(`<tr><td colspan="9" style="color:#e67e22; text-align:center; font-size: 12px;">Note: CI, PPD, and EMI covers are excluded (Age > 60)</td></tr>`);
            }
        }

        // 3. Property Insurance - No Age limit
        if (document.getElementById('reqProp').checked && idxProp >= 0 && idxProp < 10) {
            const base = saProp * giRates.property[idxProp];
            const gst = base * 0.18;
            const total = base + gst;
            totalPrem += total; totalGST += gst;
            rows.push(`<tr><td>ACKO General Insurance</td><td>Property Insurance</td><td>${propTenure} Years</td><td>Y</td><td>${saProp}</td><td>${formatAmt(base)}</td><td>${formatAmt(gst)}</td><td>${formatAmt(total)}</td><td>${formatPercent(total/loanAmt)}</td></tr>`);
        }

        const finalTotalPremRounded = Math.ceil(totalPrem);
        const finalVP = finalTotalPremRounded / loanAmt;
        
        // Update Table
        rows.push(`<tr class="totals"><td colspan="5" style="text-align:right">Grand Total:</td><td>${formatAmt(totalPrem - totalGST)}</td><td>${formatAmt(totalGST)}</td><td>${formatAmt(finalTotalPremRounded)}</td><td>${formatPercent(finalVP)}</td></tr>`);
        document.getElementById('resultBody').innerHTML = rows.join('');

        // Update Summary Card
        document.getElementById('summaryTotalAmt').innerText = '₹' + formatAmt(finalTotalPremRounded);
        document.getElementById('summaryVPVal').innerText = formatPercent(finalVP);
    }

    window.onload = function() {
        calculatePremium();
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('input', calculatePremium);
            input.addEventListener('change', calculatePremium);
        });
    };
</script>

</body>
</html>
